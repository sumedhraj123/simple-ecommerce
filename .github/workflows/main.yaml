name: Deploy E-commerce App

on:
  push:
    branches: main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPO: ${{ secrets.ECR_REPO }}

jobs:
  build:
    name: Build & Push to ECR
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🔓 Login to Amazon ECR
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login \
          --username AWS \
          --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Clean workspace
        run: |
          rm -rf node_modules

      - name: 🧱 Build & Push Docker Image
        run: |
          docker build -t e-commerce-app .
          docker tag e-commerce-app:latest $ECR_REPO:latest
          docker push $ECR_REPO:latest

  deploy:
    name: 🚀 Deploy App from ECR
    runs-on: [self-hosted, linux, x64]
    needs: build

    steps:
      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🧹 Clean old container
        run: |
          docker stop e-commerce-app || true
          docker rm e-commerce-app || true

      - name: 🔓 Login to ECR
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login \
          --username AWS \
          --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: 📥 Pull Latest Image
        run: |
          docker pull $ECR_REPO:latest

      - name: 🚀 Run with Docker Compose
        run: |
          export IMAGE=$ECR_REPO:latest
          docker-compose up -d

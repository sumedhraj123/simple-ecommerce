name: Deploy E-commerce App

on:
  push:
    branches: main

jobs: 
  build: 
    name: 🔨 Build & Push to ECR (Main) 
    runs-on: [self-hosted, linux, x64]  

    steps: 
    - name: Checkout Source 
      uses: actions/checkout@v5

    - name: 🔐 Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: 🔐 Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}    
      run: |
        aws ecr get-login-password --region $AWS_REGION \
        | docker login \
        --username AWS \
        --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com   

    - name: Clean up workspace
      run: |
            sudo rm -rf node_modules
            docker system prune -af


    - name: Delete old ECR image with same tag (if exists)
      run: |
              aws ecr batch-delete-image \
              --repository-name <your-repo-name> \
              --image-ids imageTag=latest || true

    - name: 🧱 Build & Push Docker Image
      run: |
          docker build --no-cache -t simple-app .
          docker tag simple-app:latest $ECR_REPO:latest
          docker push $ECR_REPO:latest
